name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact-name: windows-installer
            artifact-glob: 'out/make/squirrel.windows/**/*.exe'
          - os: macos-latest
            artifact-name: macos-installer
            artifact-glob: 'out/make/*.dmg'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build Swift mic-detector (macOS only)
        if: runner.os == 'macOS'
        run: |
          cd swift-mic-detector
          swift build -c release

      - name: Install dependencies
        run: npm ci

      - name: Make distributables
        run: npm run make

      - name: Rename artifacts with version
        shell: bash
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          find out/make -name '*.dmg' -o -name '*.exe' | while read -r file; do
            ext="${file##*.}"
            mv "$file" "${file%.*}-${TAG_NAME}.${ext}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

  publish:
    needs: [release-please, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          find artifacts -type f \( -name '*.exe' -o -name '*.dmg' \) | while read -r file; do
            echo "Uploading: $file"
            gh release upload "$TAG_NAME" "$file" --clobber
          done
